---
services:
  # === Development (profile: dev) ===
  db-dev:
    extends:
      file: compose/base.yml
      service: postgres
    profiles: [dev]
    networks: [dev]
    environment:
      POSTGRES_MULTIPLE_DATABASES: medtracker_queue
    volumes:
      - medtracker_dev_postgres:/var/lib/postgresql
      - ./compose/init-roles.sql:/docker-entrypoint-initdb.d/001-init-roles.sql:ro
      - ./compose/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro

  mail-dev:
    image: axllent/mailpit:latest
    profiles: [dev]
    networks:
      dev:
        aliases: [mailpit]
    ports:
      - "8025" # Web UI
      - "1025" # SMTP
    restart: unless-stopped

  migrate-dev:
    extends:
      file: compose/base.yml
      service: rails
    image: med-tracker-web-dev
    profiles: [dev]
    networks: [dev]
    build:
      target: development
      args:
        RAILS_ENV: development
    command: bin/rails db:prepare
    depends_on:
      db-dev:
        condition: service_healthy
    environment: &rails_env_dev
      RAILS_ENV: development
      RAILS_FORCE_SSL: "false"
      DATABASE_URL: postgresql://medtracker_migration:local_migration_only@db-dev:5432/medtracker
      DATABASE_ROLE: ${DEV_MIGRATION_DATABASE_ROLE:-med_tracker_owner}
      SOLID_QUEUE_DATABASE_URL: postgresql://medtracker_auxiliary:local_auxiliary_only@db-dev:5432/medtracker_queue
      NHS_DMD_CLIENT_ID: ${NHS_DMD_CLIENT_ID:-}
      NHS_DMD_CLIENT_SECRET: ${NHS_DMD_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-OIDC}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
    volumes:
      - .:/app
      - ${MEDTRACKER_GIT_COMMON_DIR:-.git}:${MEDTRACKER_GIT_COMMON_DIR:-.git}:ro
      - medtracker_dev_bundle:/usr/local/bundle
      - medtracker_dev_node_modules:/app/node_modules
      - medtracker_dev_storage:/app/storage

  web-dev:
    extends:
      file: compose/base.yml
      service: rails
    profiles: [dev]
    networks: [dev]
    build:
      target: development
      args:
        RAILS_ENV: development
    depends_on:
      db-dev:
        condition: service_healthy
      mail-dev:
        condition: service_started
      migrate-dev:
        condition: service_completed_successfully
    environment:
      <<: *rails_env_dev
      DATABASE_URL: postgresql://medtracker_runtime:local_runtime_only@db-dev:5432/medtracker
      DATABASE_ROLE: ${DEV_DATABASE_ROLE:-med_tracker_app}
      SOLID_QUEUE_IN_PUMA: "true"
    volumes:
      - .:/app
      - ${MEDTRACKER_GIT_COMMON_DIR:-.git}:${MEDTRACKER_GIT_COMMON_DIR:-.git}:ro
      - medtracker_dev_bundle:/usr/local/bundle
      - medtracker_dev_node_modules:/app/node_modules
      - medtracker_dev_storage:/app/storage
    tmpfs:
      - /app/tmp/pids:uid=1000,gid=1000
      - /app/tmp/cache:uid=1000,gid=1000
      - /app/public/assets:uid=1000,gid=1000

  # === Test (profile: test) ===
  mail-test:
    image: axllent/mailpit:latest
    profiles: [test]
    networks:
      test:
        aliases: [mail-test]
    ports:
      - "8025" # Web UI
      - "1025" # SMTP
    restart: unless-stopped

  db-test:
    extends:
      file: compose/base.yml
      service: postgres
    profiles: [test]
    networks: [test]
    volumes:
      - ./compose/init-roles.sql:/docker-entrypoint-initdb.d/001-init-roles.sql:ro
    healthcheck:
      interval: 5s
      timeout: 3s

  migrate-test:
    extends:
      file: compose/base.yml
      service: rails
    image: med-tracker-web-test
    profiles: [test]
    networks: [test]
    build:
      target: test
    command: bin/rails db:prepare
    depends_on:
      db-test:
        condition: service_healthy
    environment: &rails_env_test
      RAILS_ENV: test
      DATABASE_URL: postgresql://medtracker_migration:local_migration_only@db-test:5432/medtracker
      DATABASE_ROLE: ${TEST_MIGRATION_DATABASE_ROLE:-med_tracker_owner}
      SMTP_ADDRESS: mail-test
      APP_URL: ${TEST_APP_URL:-http://localhost:3000}
      OIDC_CLIENT_ID: ${TEST_OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${TEST_OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER_URL: ${TEST_OIDC_ISSUER_URL:-}
      OIDC_PROVIDER_NAME: ${TEST_OIDC_PROVIDER_NAME:-OIDC}
      OIDC_REDIRECT_URI: ${TEST_OIDC_REDIRECT_URI:-}
      COVERAGE: ${COVERAGE:-false}
      SIMPLECOV_COMMAND_NAME: ${SIMPLECOV_COMMAND_NAME:-rspec}
    volumes:
      - .:/app
      - ${MEDTRACKER_GIT_COMMON_DIR:-.git}:${MEDTRACKER_GIT_COMMON_DIR:-.git}:ro
      - medtracker_test_bundle:/usr/local/bundle
      - medtracker_test_node_modules:/app/node_modules

  web-test:
    extends:
      file: compose/base.yml
      service: rails
    profiles: [test]
    networks: [test]
    build:
      target: test
    depends_on:
      db-test:
        condition: service_healthy
      mail-test:
        condition: service_started
      migrate-test:
        condition: service_completed_successfully
    environment:
      <<: *rails_env_test
      DATABASE_URL: postgresql://medtracker_runtime:local_runtime_only@db-test:5432/medtracker
      DATABASE_ROLE: ${TEST_DATABASE_ROLE:-med_tracker_app}
    volumes:
      - .:/app
      - ${MEDTRACKER_GIT_COMMON_DIR:-.git}:${MEDTRACKER_GIT_COMMON_DIR:-.git}:ro
      - medtracker_test_bundle:/usr/local/bundle
      - medtracker_test_node_modules:/app/node_modules
      - ./tmp/capybara:/app/tmp/capybara
    tmpfs:
      - /app/tmp/pids:uid=1000,gid=1000
      - /app/tmp/cache:uid=1000,gid=1000
      - /app/public/assets:uid=1000,gid=1000
    healthcheck:
      disable: true

  test-runner:
    extends:
      file: compose/base.yml
      service: rails
    image: med-tracker-web-test
    profiles: [test]
    networks: [test]
    depends_on:
      db-test:
        condition: service_healthy
      mail-test:
        condition: service_started
      migrate-test:
        condition: service_completed_successfully
    environment:
      <<: *rails_env_test
      DATABASE_URL: postgresql://medtracker:medtracker_password@db-test:5432/medtracker
      DATABASE_ROLE:
    volumes:
      - .:/app
      - ${MEDTRACKER_GIT_COMMON_DIR:-.git}:${MEDTRACKER_GIT_COMMON_DIR:-.git}:ro
      - medtracker_test_bundle:/usr/local/bundle
      - medtracker_test_node_modules:/app/node_modules
      - ./tmp/capybara:/app/tmp/capybara
    tmpfs:
      - /app/tmp/pids:uid=1000,gid=1000
      - /app/tmp/cache:uid=1000,gid=1000
      - /app/public/assets:uid=1000,gid=1000
    healthcheck:
      disable: true

  tools-test:
    extends:
      file: compose/base.yml
      service: rails
    image: med-tracker-tools-test
    profiles: [test]
    networks: [test]
    build:
      target: tools
    environment:
      RAILS_ENV: test
    volumes:
      - .:/app
      - ${MEDTRACKER_GIT_COMMON_DIR:-.git}:${MEDTRACKER_GIT_COMMON_DIR:-.git}:ro
      - medtracker_tools_bundle:/usr/local/bundle
    tmpfs:
      - /app/tmp/pids:uid=1000,gid=1000
      - /app/tmp/cache:uid=1000,gid=1000
      - /app/public/assets:uid=1000,gid=1000
    healthcheck:
      disable: true

  # === Production (profile: prod) ===
  db-prod:
    extends:
      file: compose/base.yml
      service: postgres
    profiles: [prod]
    networks: [prod]
    environment:
      POSTGRES_MULTIPLE_DATABASES: medtracker_production_queue,medtracker_production_cache,medtracker_production_cable
    volumes:
      - medtracker_prod_postgres:/var/lib/postgresql
      - ./compose/init-roles.sql:/docker-entrypoint-initdb.d/001-init-roles.sql:ro
      - ./compose/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro

  migrate-prod:
    extends:
      file: compose/base.yml
      service: rails
    profiles: [prod]
    networks: [prod]
    image: ${APP_IMAGE_REF:-med-tracker:local-production-build}
    build:
      target: app
      args:
        APP_IMAGE_REF: ${APP_IMAGE_REF:-med-tracker:local-production-build}
    command: bin/rails db:migrate
    depends_on:
      db-prod:
        condition: service_healthy
    environment: &rails_env_prod
      RAILS_ENV: production
      APP_URL: ${APP_URL:-http://localhost}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-persistent}
      ACTIVE_STORAGE_ROOT: ${ACTIVE_STORAGE_ROOT:-/app/storage}
      DATABASE_URL: postgresql://medtracker_migration:local_migration_only@db-prod:5432/medtracker
      DATABASE_ROLE: ${MIGRATION_DATABASE_ROLE:-med_tracker_owner}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-local-prod-testing-only-not-for-real-use}
      SOLID_QUEUE_DATABASE_URL: postgresql://medtracker_auxiliary:local_auxiliary_only@db-prod:5432/medtracker_production_queue
      SOLID_CACHE_DATABASE_URL: postgresql://medtracker_auxiliary:local_auxiliary_only@db-prod:5432/medtracker_production_cache
      SOLID_CABLE_DATABASE_URL: postgresql://medtracker_auxiliary:local_auxiliary_only@db-prod:5432/medtracker_production_cable
    volumes:
      - medtracker_prod_storage:/app/storage

  web-prod:
    extends:
      file: compose/base.yml
      service: rails
    profiles: [prod]
    networks: [prod]
    image: ${APP_IMAGE_REF:-med-tracker:local-production-build}
    build:
      target: app
      args:
        APP_IMAGE_REF: ${APP_IMAGE_REF:-med-tracker:local-production-build}
    depends_on:
      db-prod:
        condition: service_healthy
      migrate-prod:
        condition: service_completed_successfully
    environment:
      <<: *rails_env_prod
      DATABASE_URL: postgresql://medtracker_runtime:local_runtime_only@db-prod:5432/medtracker
      DATABASE_ROLE: ${DATABASE_ROLE:-med_tracker_app}
      SOLID_QUEUE_IN_PUMA: "true"
    ports:
      - "80"
    volumes:
      - medtracker_prod_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/up || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s

  audit-exporter-prod:
    extends:
      file: compose/base.yml
      service: rails
    profiles: [prod]
    networks: [prod]
    image: ${APP_IMAGE_REF:-med-tracker:local-production-build}
    build:
      target: app
      args:
        APP_IMAGE_REF: ${APP_IMAGE_REF:-med-tracker:local-production-build}
    command: bin/audit-exporter
    depends_on:
      db-prod:
        condition: service_healthy
      migrate-prod:
        condition: service_completed_successfully
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://medtracker_audit_exporter:local_audit_exporter_only@db-prod:5432/medtracker
      DATABASE_ROLE: med_tracker_audit_exporter
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-local-prod-testing-only-not-for-real-use}
      APP_URL: ${APP_URL:-http://localhost}
      AUDIT_WORM_BUCKET: ${AUDIT_WORM_BUCKET:-}
      AUDIT_WORM_REGION: ${AUDIT_WORM_REGION:-eu-west-2}
      AUDIT_WORM_EXPECTED_OWNER: ${AUDIT_WORM_EXPECTED_OWNER:-}
      AUDIT_WORM_RETENTION_MODE: ${AUDIT_WORM_RETENTION_MODE:-GOVERNANCE}
      AUDIT_WORM_COMPLIANCE_APPROVED: ${AUDIT_WORM_COMPLIANCE_APPROVED:-false}
      AUDIT_WORM_SSE: ${AUDIT_WORM_SSE:-aws:kms}
      AUDIT_WORM_KMS_KEY_ID: ${AUDIT_WORM_KMS_KEY_ID:-}
      AUDIT_WORM_ENDPOINT: ${AUDIT_WORM_ENDPOINT:-}
      AUDIT_WORM_FORCE_PATH_STYLE: ${AUDIT_WORM_FORCE_PATH_STYLE:-false}
      AUDIT_SIGNING_KEY_ID: ${AUDIT_SIGNING_KEY_ID:-}
      AUDIT_SIGNING_PRIVATE_KEY: ${AUDIT_SIGNING_PRIVATE_KEY:-}
      AUDIT_SIGNING_PRIVATE_KEY_FILE: ${AUDIT_SIGNING_PRIVATE_KEY_FILE:-}
      AWS_ACCESS_KEY_ID: ${AUDIT_WORM_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AUDIT_WORM_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AUDIT_WORM_SESSION_TOKEN:-}
    ports: []
    restart: unless-stopped
    healthcheck:
      disable: true

  audit-verifier-prod:
    extends:
      file: compose/base.yml
      service: rails
    profiles: [audit]
    networks: [prod]
    image: ${APP_IMAGE_REF:-med-tracker:local-production-build}
    build:
      target: app
      args:
        APP_IMAGE_REF: ${APP_IMAGE_REF:-med-tracker:local-production-build}
    depends_on:
      db-prod:
        condition: service_healthy
      migrate-prod:
        condition: service_completed_successfully
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://medtracker_audit_verifier:local_audit_verifier_only@db-prod:5432/medtracker
      DATABASE_ROLE: med_tracker_audit_verifier
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-local-prod-testing-only-not-for-real-use}
      APP_URL: ${APP_URL:-http://localhost}
      SCOPE: ${SCOPE:-database}
      FORMAT: ${FORMAT:-human}
      HOUSEHOLD_ID: ${HOUSEHOLD_ID:-}
      FROM: ${FROM:-}
      TO: ${TO:-}
      OUTPUT: ${OUTPUT:-tmp/audit-exports/latest}
      FHIR: ${FHIR:-false}
      AUDIT_WORM_BUCKET: ${AUDIT_WORM_BUCKET:-}
      AUDIT_WORM_REGION: ${AUDIT_WORM_REGION:-eu-west-2}
      AUDIT_WORM_EXPECTED_OWNER: ${AUDIT_WORM_EXPECTED_OWNER:-}
      AUDIT_WORM_RETENTION_MODE: ${AUDIT_WORM_RETENTION_MODE:-GOVERNANCE}
      AUDIT_WORM_COMPLIANCE_APPROVED: ${AUDIT_WORM_COMPLIANCE_APPROVED:-false}
      AUDIT_WORM_SSE: ${AUDIT_WORM_SSE:-aws:kms}
      AUDIT_WORM_KMS_KEY_ID: ${AUDIT_WORM_KMS_KEY_ID:-}
      AUDIT_WORM_ENDPOINT: ${AUDIT_WORM_ENDPOINT:-}
      AUDIT_WORM_FORCE_PATH_STYLE: ${AUDIT_WORM_FORCE_PATH_STYLE:-false}
      AUDIT_MANIFEST_SIGNING_KEY_ID: ${AUDIT_MANIFEST_SIGNING_KEY_ID:-}
      AUDIT_MANIFEST_SIGNING_PRIVATE_KEY: ${AUDIT_MANIFEST_SIGNING_PRIVATE_KEY:-}
      AUDIT_MANIFEST_SIGNING_PRIVATE_KEY_FILE: ${AUDIT_MANIFEST_SIGNING_PRIVATE_KEY_FILE:-}
      AWS_ACCESS_KEY_ID: ${AUDIT_VERIFY_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AUDIT_VERIFY_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AUDIT_VERIFY_SESSION_TOKEN:-}
    ports: []
    volumes:
      - ./tmp/audit-exports:/app/tmp/audit-exports
    healthcheck:
      disable: true

networks:
  dev:
  test:
  prod:

volumes:
  medtracker_dev_postgres:
  medtracker_dev_bundle:
  medtracker_dev_node_modules:
  medtracker_dev_storage:
  medtracker_test_bundle:
  medtracker_test_node_modules:
  medtracker_tools_bundle:
  medtracker_prod_postgres:
  medtracker_prod_storage:
