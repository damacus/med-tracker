---
version: "3"
silent: true
run: once

includes:
  dev:
    taskfile: Taskfiles/dev.yml
  test:
    taskfile: Taskfiles/test.yml
  local:
    taskfile: Taskfiles/local.yml
  prod:
    taskfile: Taskfiles/prod.yml
  internal:
    taskfile: Taskfiles/internal.yml
  lighthouse:
    taskfile: Taskfiles/lighthouse.yml
  docs:
    taskfile: Taskfiles/docs.yml
  worktree:
    taskfile: Taskfiles/worktree.yml
  audit:
    taskfile: Taskfiles/audit.yml

tasks:
  default:
    desc: List all available tasks
    summary: Default task - shows all available commands
    silent: true
    cmds: [task --list]

  client-tools:fmt:
    desc: Format Rust client tools
    cmds:
      - cargo fmt --manifest-path client-tools/Cargo.toml --all

  client-tools:check:
    desc: Check Rust client tools
    cmds:
      - cargo check --manifest-path client-tools/Cargo.toml --workspace --all-targets

  client-tools:clippy:
    desc: Lint Rust client tools
    cmds:
      - cargo clippy --manifest-path client-tools/Cargo.toml --workspace --all-targets -- -D warnings

  client-tools:test:
    desc: Test Rust client tools
    cmds:
      - cargo test --manifest-path client-tools/Cargo.toml --workspace

  test:
    desc: Run tests in Docker (optionally specify TEST_FILE=path/to/spec)
    summary: |
      Run RSpec tests in Docker environment
      Usage: task test
      Usage: task test TEST_FILE=spec/models/user_spec.rb
    silent: true
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: test
          COMMAND: 'bundle exec rspec --profile 20 --format documentation {{ .TEST_FILE | default "spec" }}'
          TEST_FILE: '{{ .TEST_FILE | default "spec" }}'

  households:migrate_local:
    desc: Migrate the local pre-household database into one household
    summary: |
      Deterministically migrate local pre-household data into one household.
      Usage: task households:migrate_local OWNER_EMAIL=dan@example.com HOUSEHOLD_NAME="Dan's household" DRY_RUN=1
      Usage: task households:migrate_local OWNER_EMAIL=dan@example.com HOUSEHOLD_NAME="Dan's household" APPLY=1
    requires:
      vars: [OWNER_EMAIL, HOUSEHOLD_NAME]
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'OWNER_EMAIL="{{ .OWNER_EMAIL }}" HOUSEHOLD_NAME="{{ .HOUSEHOLD_NAME }}" DRY_RUN="{{ .DRY_RUN }}" APPLY="{{ .APPLY }}" rails households:migrate_local'

  medication-review:snapshot:
    desc: Regenerate the committed 80-label public evidence snapshot
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'bin/rails medication_review_evidence:snapshot'

  medication-review:terminology-snapshot:
    desc: Regenerate the committed no-license NLM RxClass terminology snapshot
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'bin/rails medication_review_evidence:terminology_snapshot'

  medication-review:import:
    desc: Import the committed public evidence snapshot into the development database
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'bin/rails medication_review_evidence:import'

  medication-review:benchmark:
    desc: Measure automatic detection against the committed public evidence snapshot
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'bin/rails medication_review_evidence:benchmark'

  medication-review:refresh:
    desc: Refresh public medication-review evidence and report source changes
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'bin/rails medication_review_evidence:refresh'

  stop-all:
    desc: Stop all services for this worktree (dev, test, prod)
    summary: |
      Stop all Docker containers, networks, and services for this branch/worktree.
      Use when finished with a branch or worktree.
      Usage: task stop-all
    cmds:
      - task: internal:stop
        vars: { ENVIRONMENT: dev }
      - task: internal:stop
        vars: { ENVIRONMENT: test }
      - task: internal:stop
        vars: { ENVIRONMENT: prod }

  rubocop:
    desc: Run RuboCop linter (optionally with autocorrect)
    summary: |
      Run RuboCop linter with optional autocorrect in Docker
      Usage: task rubocop
      Usage: task rubocop AUTOCORRECT=true
    vars:
      autocorrect: '{{ .AUTOCORRECT | default "false" }}'
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: test
          SERVICE: tools-test
          COMMAND: 'bundle exec rubocop --force-exclusion {{ if eq .autocorrect "true" }}-A{{ end }}'

  brakeman:
    desc: Run Brakeman security scanner
    summary: |
      Run Brakeman in the tools container, matching CI's Ruby Security Scan.
      Usage: task brakeman
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: test
          SERVICE: tools-test
          COMMAND: 'bin/brakeman --no-pager'

  rubycritic:
    desc: Run RubyCritic quality analysis
    summary: |
      Run RubyCritic against application code, or a supplied target.
      Usage: task rubycritic
      Usage: task rubycritic TARGET=app/services/foo.rb
    vars:
      target: '{{ .TARGET | default "app" }}'
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: test
          SERVICE: tools-test
          COMMAND: 'bundle exec rubycritic --format console --no-browser {{ .target }}'

  playwright:
    desc: Run local Playwright browser tests
    summary: |
      Run the local browser test suite backed by Playwright.
      This delegates to the local CI-like test environment.
      Usage: task playwright
      Usage: task playwright TEST_FILE=spec/system/foo_spec.rb
    cmds:
      - task: local:test:browser
        vars:
          TEST_FILE: '{{ .TEST_FILE | default "" }}'

  profile:dashboard:
    desc: Capture a Vernier baseline profile for the dashboard pipeline
    summary: |
      Capture a reproducible Vernier profile for the representative dashboard pipeline.
      Requires the development database and seeded data.
      Usage: task profile:dashboard
      Usage: task profile:dashboard OUT=docs/performance/profiles/dashboard-before.vernier.json.gz
      Usage: task profile:dashboard PROFILE_DASHBOARD_EMAIL=admin@example.com
    vars:
      output: '{{ .OUT | default "docs/performance/profiles/dashboard-baseline.vernier.json.gz" }}'
      summary_path: '{{ .SUMMARY | default "docs/performance/dashboard-baseline.md" }}'
      interval: '{{ .INTERVAL | default "500" }}'
      allocation_interval: '{{ .ALLOCATION_INTERVAL | default "10" }}'
      profile_email: '{{ .PROFILE_DASHBOARD_EMAIL | default "admin@example.com" }}'
      selected_person_id: '{{ .PROFILE_DASHBOARD_PERSON_ID | default "all" }}'
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: >-
            env PROFILE_DASHBOARD_EMAIL={{ .profile_email }}
            PROFILE_DASHBOARD_PERSON_ID={{ .selected_person_id }}
            PROFILE_DASHBOARD_ARTIFACT={{ .output }}
            PROFILE_DASHBOARD_SUMMARY={{ .summary_path }}
            bundle exec vernier run
            --output {{ .output }}
            --interval {{ .interval }}
            --allocation-interval {{ .allocation_interval }}
            --hooks rails,memory_usage
            --metadata workflow=dashboard
            --
            bin/rails runner scripts/profile_dashboard_request.rb

  translator:hook:
    desc: Run the Codex translator hook for staged locale and typography changes
    summary: |
      Runs the shared translator skill when staged files include locale YAML
      or Ruby UI typography components.
      Usage: task translator:hook
    cmds:
      - ./scripts/translator_hook.fish

  mutation:
    desc: Run mutation testing on a subject (SUBJECT=ClassName)
    summary: |
      Run mutant against a subject match expression inside the test container.
      Requires the test database — run `task test:up` first.
      Usage: task mutation SUBJECT=MedicationFriendlyName
      Usage: task mutation SUBJECT='GlobalSearch::ResultBuilder*'
    requires:
      vars: [SUBJECT]
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: test
          COMMAND: 'env RAILS_ENV=test bundle exec mutant run -- "{{ .SUBJECT }}"'

  mutation:since:
    desc: Mutation-test only subjects changed since a git ref (REF, default origin/main)
    summary: |
      Incremental mutation run — mutates only subjects touched since REF.
      Usage: task mutation:since
      Usage: task mutation:since REF=HEAD~3
    vars:
      ref: '{{ .REF | default "origin/main" }}'
    cmds:
      - task: internal:run
        vars:
          ENVIRONMENT: test
          COMMAND: 'env RAILS_ENV=test bundle exec mutant run --since {{ .ref }}'
