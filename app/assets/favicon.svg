      <stop offset="0%" stop-color="#17233B"/>
      <stop offset="54%" stop-color="#102447"/>
      <stop offset="100%" stop-color="#0B5F71"/>
    </linearGradient>
    <linearGradient id="med-tracker-icon-surface" x1="108" y1="86" x2="402" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
