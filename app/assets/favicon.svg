    </linearGradient>
    <filter id="med-tracker-icon-shadow" x="58" y="60" width="396" height="392" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" flood-color="#061225" flood-opacity="0.28" stdDeviation="18"/>
