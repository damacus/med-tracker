---
name: CI

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  scan_ruby:
    runs-on: [ubuntu-latest]
    name: Ruby Security Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: [ubuntu-latest]
    name: JavaScript Security Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: [ubuntu-latest]
    name: Code Style Check
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  client_tools:
    runs-on: [ubuntu-latest]
    name: Rust Client Tools
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: client-tools

      - name: Check formatting
        run: cargo fmt --manifest-path client-tools/Cargo.toml --all --check

      - name: Check workspace
        run: cargo check --manifest-path client-tools/Cargo.toml --workspace --all-targets

      - name: Lint workspace
        run: cargo clippy --manifest-path client-tools/Cargo.toml --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --manifest-path client-tools/Cargo.toml --workspace

  test_non_system:
    runs-on: [ubuntu-latest]
    name: RSpec Tests (Models, Policies, Controllers, Components)
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: medtracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_ADAPTER: postgresql
      DATABASE_URL: postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/medtracker_test
      RAILS_ENV: test
      COVERAGE: true
      SIMPLECOV_COMMAND_NAME: rspec-non-system

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:migrate

      - name: Precompile assets
        run: bundle exec rails assets:precompile

      - name: Run non-browser tests
        run: bundle exec rspec --format RSpec::Github::Formatter --tag ~browser

      - name: Upload SimpleCov coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: simplecov-non-system
          path: coverage
          if-no-files-found: ignore

  test_system:
    runs-on: [ubuntu-latest]
    name: RSpec System Tests (Playwright) - Shard ${{ matrix.shard }}/2
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: medtracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_ADAPTER: postgresql
      DATABASE_URL: postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/medtracker_test
      RAILS_ENV: test
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and deps
        run: npx playwright install --with-deps chromium

      - name: Set up database
        run: bundle exec rails db:migrate

      - name: Precompile assets
        run: bundle exec rails assets:precompile

      - name: Run browser tests (shard ${{ matrix.shard }}/2)
        shell: bash
        run: |
          # Get all spec files and split tagged browser examples for this shard
          mapfile -t file_array < <(find spec -name '*_spec.rb' | sort)
          total_shards=2
          shard=${{ matrix.shard }}

          # Split files across shards using modulo
          shard_files=()
          for i in "${!file_array[@]}"; do
            if (( (i % total_shards) + 1 == shard )); then
              shard_files+=("${file_array[$i]}")
            fi
          done

          if [ ${#shard_files[@]} -gt 0 ]; then
            echo "Running tests for shard $shard: ${shard_files[*]}"
            bundle exec rspec --tag browser --format RSpec::Github::Formatter --format documentation "${shard_files[@]}"
          else
            echo "No files for this shard"
          fi

      - name: Upload Capybara failure screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: capybara-failures-shard-${{ matrix.shard }}
          path: |
            tmp/capybara/**/*.png
            tmp/capybara/**/*.html
          if-no-files-found: ignore
          retention-days: 7

  mutation:
    runs-on: [ubuntu-latest]
    name: Mutation Testing (advisory, changed subjects)
    timeout-minutes: 20
    continue-on-error: true # advisory until the signal is trusted
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: medtracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_ADAPTER: postgresql
      DATABASE_URL: postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/medtracker_test
      RAILS_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # mutant --since needs history + the base ref

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:migrate

      - name: Ensure base ref is available
        run: git fetch --no-tags --depth=1 origin main

      # Only mutates subjects changed since main (mutant --since), so a typical
      # PR is fast. usage: opensource (config/mutant.yml) means no licence/token.
      - name: Mutation test changed subjects (advisory)
        run: bundle exec mutant run --since origin/main

  lighthouse:
    runs-on: [ubuntu-latest]
    name: Lighthouse Mobile Audit
    needs: [test_non_system]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: medtracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_ADAPTER: postgresql
      DATABASE_URL: postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/medtracker_test
      RAILS_ENV: test
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.x

      - name: Install Node dependencies
        run: npm ci

      - name: Set up database
        run: bundle exec rails db:prepare

      - name: Seed database
        run: bundle exec rails db:seed

      - name: Precompile assets
        run: bundle exec rails assets:precompile

      - name: Start Rails server
        run: |
          bundle exec rails server -p 3000 > tmp/lighthouse-server.log 2>&1 &
          for attempt in {1..30}; do
            curl -fsS http://localhost:3000/up && break
            sleep 1
          done
          curl -fsS http://localhost:3000/up

      - name: Audit public login
        run: task lighthouse:ci URL=http://localhost:3000/login REPORT_PATH=./lighthouse-login

      - name: Audit authenticated dashboard
        run: |
          curl -fsS -c lighthouse-cookies.txt -X POST \
            --data-urlencode email=jane.doe@example.com \
            --data-urlencode password=password \
            -o /dev/null http://localhost:3000/login
          COOKIE_HEADER=$(awk 'BEGIN { separator="" } /^#HttpOnly_/ || $0 !~ /^#/ { if (NF >= 7) { printf "%s%s=%s", separator, $6, $7; separator="; " } } END { print "" }' lighthouse-cookies.txt)
          test -n "$COOKIE_HEADER"
          task lighthouse:ci \
            URL=http://localhost:3000/households/fixture-household/dashboard \
            REPORT_PATH=./lighthouse-dashboard \
            EXTRA_HEADERS="{\"Cookie\":\"${COOKIE_HEADER}\"}"

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-mobile-reports
          path: |
            lighthouse-*.report.json
            lighthouse-*.report.html
            tmp/lighthouse-server.log
          if-no-files-found: ignore
          retention-days: 30
