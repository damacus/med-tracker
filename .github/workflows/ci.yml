---
name: CI

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  scan_ruby:
    runs-on: [ubuntu-latest]
    name: Ruby Security Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: [ubuntu-latest]
    name: JavaScript Security Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: [ubuntu-latest]
    name: Code Style Check
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test_non_system:
    runs-on: [ubuntu-latest]
    name: RSpec Tests (Models, Policies, Controllers, Components)
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: medtracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_ADAPTER: postgresql
      DATABASE_URL: postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/medtracker_test
      RAILS_ENV: test
      COVERAGE: true
      SIMPLECOV_COMMAND_NAME: rspec-non-system

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.4"
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:migrate

      - name: Precompile assets
        run: bundle exec rails assets:precompile

      - name: Run non-browser tests
        run: bundle exec rspec --format RSpec::Github::Formatter --tag ~browser

      - name: Upload SimpleCov coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: simplecov-non-system
          path: coverage
          if-no-files-found: ignore

  test_system:
    runs-on: [ubuntu-latest]
    name: RSpec System Tests (Playwright) - Shard ${{ matrix.shard }}/2
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: medtracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_ADAPTER: postgresql
      DATABASE_URL: postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/medtracker_test
      RAILS_ENV: test
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.4"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and deps
        run: npx playwright install --with-deps chromium

      - name: Set up database
        run: bundle exec rails db:migrate

      - name: Precompile assets
        run: bundle exec rails assets:precompile

      - name: Run browser tests (shard ${{ matrix.shard }}/2)
        shell: bash
        run: |
          # Get all browser test files and split them for this shard
          mapfile -t file_array < <(find spec/features spec/system -name '*_spec.rb' | sort)
          total_shards=2
          shard=${{ matrix.shard }}

          # Split files across shards using modulo
          shard_files=()
          for i in "${!file_array[@]}"; do
            if (( (i % total_shards) + 1 == shard )); then
              shard_files+=("${file_array[$i]}")
            fi
          done

          if [ ${#shard_files[@]} -gt 0 ]; then
            echo "Running tests for shard $shard: ${shard_files[*]}"
            bundle exec rspec --format RSpec::Github::Formatter --format documentation "${shard_files[@]}"
          else
            echo "No files for this shard"
          fi

  mutation:
    runs-on: [ubuntu-latest]
    name: Mutation Testing (advisory, changed subjects)
    timeout-minutes: 20
    continue-on-error: true # advisory until the signal is trusted
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: medtracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_ADAPTER: postgresql
      DATABASE_URL: postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/medtracker_test
      RAILS_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # mutant --since needs history + the base ref

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.4"
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:migrate

      - name: Ensure base ref is available
        run: git fetch --no-tags --depth=1 origin main

      # Only mutates subjects changed since main (mutant --since), so a typical
      # PR is fast. usage: opensource (config/mutant.yml) means no licence/token.
      - name: Mutation test changed subjects (advisory)
        run: bundle exec mutant run --since origin/main

