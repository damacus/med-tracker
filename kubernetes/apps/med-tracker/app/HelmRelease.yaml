# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: med-tracker
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.5.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      med-tracker:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/damacus/med-tracker
              tag: v0.1.0 # x-release-please-version
            env:
              - name: RAILS_ENV
                value: "production"
              - name: RAILS_LOG_TO_STDOUT
                value: "true"
              - name: RAILS_SERVE_STATIC_FILES
                value: "true"
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: med-tracker-app
                    key: uri
            envFrom:
              - secretRef:
                  name: med-tracker-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: &port 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: med-tracker
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "meds.ironstone.casa"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - kind: Service
                name: med-tracker
                namespace: med-tracker
                port: *port
                weight: 1

    persistence:
      # Writable tmp directory for Rails
      tmp:
        type: emptyDir
        advancedMounts:
          med-tracker:
            app:
              - path: /app/tmp
                subPath: tmp
              - path: /app/log
                subPath: log

      # Optional: persistent storage for uploads if needed
      # storage:
      #   existingClaim: med-tracker-storage
      #   globalMounts:
      #     - path: /app/storage
