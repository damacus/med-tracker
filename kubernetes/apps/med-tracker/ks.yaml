---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: med-tracker
  namespace: flux-system
spec:
  targetNamespace: med-tracker
  path: ./kubernetes/apps/med-tracker/app
  prune: true
  dependsOn:
    - name: med-tracker-db
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
