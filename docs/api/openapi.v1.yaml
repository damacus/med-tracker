components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    household_id:
      name: household_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/NumericId'
    id:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/NumericId'
    resource_id:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ResourceIdentifier'
    native_device_token:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/DeviceTokenIdentifier'
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    per_page:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    updated_since:
      name: updated_since
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Timestamp'
    if_match:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
  headers:
    etag:
      description: Version identifier for optimistic concurrency.
      required: true
      schema:
        type: string
    retry_after:
      description: Seconds until the request may be retried.
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    Unauthorized:
      description: The bearer credential is absent, invalid, expired, revoked, or no longer active.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: The credential cannot perform the operation in the routed household or person scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: The resource does not exist inside the authorized scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationFailed:
      description: The submitted attributes or filters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: The resource or idempotency state conflicts with the requested mutation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    PreconditionRequired:
      description: The mutation requires a version precondition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: The request exceeded an API rate limit.
      headers:
        Retry-After:
          $ref: '#/components/headers/retry_after'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitErrorEnvelope'
  schemas:
    NumericId:
      type: integer
      minimum: 1
    PortableId:
      type: string
      format: uuid
    ResourceIdentifier:
      oneOf:
        - $ref: '#/components/schemas/NumericId'
        - $ref: '#/components/schemas/PortableId'
    DeviceTokenIdentifier:
      type: string
      minLength: 1
    NullableNumericId:
      oneOf:
        - $ref: '#/components/schemas/NumericId'
        - type: 'null'
    NullablePortableId:
      oneOf:
        - $ref: '#/components/schemas/PortableId'
        - type: 'null'
    Timestamp:
      type: string
      format: date-time
    Date:
      type: string
      format: date
    PaginationMeta:
      type: object
      additionalProperties: false
      required:
        - page
        - per_page
        - total_count
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
          maximum: 100
        total_count:
          type: integer
          minimum: 0
    PersonAttributes:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        email:
          type:
            - string
            - 'null'
          format: email
        date_of_birth:
          $ref: '#/components/schemas/Date'
        person_type:
          type: string
          enum:
            - adult
            - minor
            - dependent_adult
        has_capacity:
          type: boolean
    Person:
      type: object
      additionalProperties: false
      required:
        - id
        - portable_id
        - updated_at
        - name
        - email
        - date_of_birth
        - person_type
        - has_capacity
        - age
        - location_ids
        - location_portable_ids
        - notification_preference_id
        - notification_preference_portable_id
      properties:
        id:
          $ref: '#/components/schemas/NumericId'
        portable_id:
          $ref: '#/components/schemas/PortableId'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
        name:
          type: string
          minLength: 1
        email:
          type:
            - string
            - 'null'
          format: email
        date_of_birth:
          oneOf:
            - $ref: '#/components/schemas/Date'
            - type: 'null'
        person_type:
          type: string
          enum:
            - adult
            - minor
            - dependent_adult
        has_capacity:
          type: boolean
        age:
          type:
            - integer
            - 'null'
        location_ids:
          type: array
          items:
            $ref: '#/components/schemas/NumericId'
        location_portable_ids:
          type: array
          items:
            $ref: '#/components/schemas/PortableId'
        notification_preference_id:
          $ref: '#/components/schemas/NullableNumericId'
        notification_preference_portable_id:
          $ref: '#/components/schemas/NullablePortableId'
    PersonCreateRequest:
      type: object
      additionalProperties: false
      required:
        - person
      properties:
        person:
          allOf:
            - $ref: '#/components/schemas/PersonAttributes'
            - required:
                - name
                - date_of_birth
    PersonUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - person
      properties:
        person:
          $ref: '#/components/schemas/PersonAttributes'
    PersonResponse:
      type: object
      additionalProperties: false
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Person'
    PersonCollectionResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Person'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ValidationErrors:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
    Error:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        request_id:
          type: string
          minLength: 1
        errors:
          $ref: '#/components/schemas/ValidationErrors'
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/Error'
    RateLimitError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          const: rate_limited
        message:
          type: string
          minLength: 1
    RateLimitErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/RateLimitError'
    SyncBatchRequest:
      type: object
      additionalProperties: false
      required:
        - batch
      properties:
        batch:
          type: object
          additionalProperties: false
          required:
            - operations
          properties:
            operations:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/SyncBatchOperation'
    SyncBatchOperation:
      type: object
      additionalProperties: false
      required:
        - action
        - resource_type
        - id
        - if_match
      properties:
        action:
          type: string
          enum:
            - update
            - delete
        resource_type:
          type: string
          enum:
            - medication
            - health_event
        id:
          $ref: '#/components/schemas/ResourceIdentifier'
        if_match:
          type: string
          description: Exact ETag from the snapshot or latest resource response.
        attributes:
          type: object
          additionalProperties: true
