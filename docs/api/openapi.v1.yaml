        - $ref: '#/components/parameters/household_id'
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Dosage option resource.
    patch:
      operationId: updateDosageOption
      tags:
        - Household
        - Dosage options
      summary: Update a medication dosage option.
      parameters:
        - $ref: '#/components/parameters/household_id'
        - $ref: '#/components/parameters/id'
      responses:
        '200':
