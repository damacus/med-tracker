      operationId: listMedications
      tags:
        - Household
        - Medications
      summary: List visible medications.
      parameters:
        - $ref: '#/components/parameters/household_id'
      responses:
        '200':
          description: Medications collection.
    post:
      operationId: createMedication
      tags:
        - Household
        - Medications
      summary: Create a medication.
      parameters:
        - $ref: '#/components/parameters/household_id'
      responses:
        '201':
