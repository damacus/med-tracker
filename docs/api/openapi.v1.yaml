components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    household_id:
      name: household_id
      in: path
      required: true
      schema:
        type: integer
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    SyncBatchRequest:
      type: object
      required:
        - batch
      properties:
        batch:
          type: object
          required:
            - operations
          properties:
            operations:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/SyncBatchOperation'
    SyncBatchOperation:
      type: object
      required:
        - action
        - resource_type
        - id
        - if_match
      properties:
        action:
          type: string
          enum:
            - update
            - delete
        resource_type:
          type: string
          enum:
            - medication
            - health_event
        id:
          type: string
        if_match:
          type: string
          description: Exact ETag from the snapshot or latest resource response.
        attributes:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - request_id
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
