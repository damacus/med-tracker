---
paracetamol:
  household: fixture_household
  name: Paracetamol
  location: home
  category: Analgesic
  dose_amount: 500
  dose_unit: "mg"
  default_schedule_type: 4
  current_supply: 80
  supply_at_last_restock: 80
  expiry_date: <%= 2.years.from_now.to_date %>
  description: >-
    Paracetamol is a common painkiller for treating aches and pains, as well as
    symptoms of colds and flu. It can also be used to reduce a high temperature
    and treat inflammation.
  warnings: >-
    Do not exceed the recommended dose. If symptoms persist for more than 3
    days, consult your doctor. Contains paracetamol - do not use with
    other paracetamol-containing products.

ibuprofen:
  household: fixture_household
  name: Ibuprofen
  location: home
  category: Analgesic
  dose_amount: 200
  dose_unit: "mg"
  default_schedule_type: 4
  current_supply: 30
  supply_at_last_restock: 30
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Ibuprofen is a nonsteroidal anti-inflammatory drug (NSAID) used for
    treating pain, fever, and inflammation.
  warnings: >-
    May cause stomach upset. Take with food or milk. Do not take if you
    have a history of stomach ulcers.

aspirin:
  household: fixture_household
  name: Aspirin
  location: home
  category: Analgesic
  description: >-
    Aspirin is used to treat pain, reduce inflammation and lower fever. It can
    also be taken in low doses to help prevent heart attacks and strokes in
    high-risk patients.
  dose_amount: 300
  dose_unit: "mg"
  current_supply: 25
  supply_at_last_restock: 25
  expiry_date: <%= 1.year.from_now.to_date %>
  warnings: >-
    Not suitable for children under 16. Do not exceed 4000mg in 24 hours. May
    cause stomach irritation. If symptoms persist, consult your doctor.

calpol:
  household: fixture_household
  name: Calpol Six Plus 250mg/5ml oral suspension (McNeil Products Ltd)
  location: home
  category: Analgesic
  description: >-
    Calpol is a brand of children's medication that contains paracetamol. It is
    used to relieve pain and reduce fever in children.
  dose_amount: 5
  dose_unit: ml
  current_supply: 35
  supply_at_last_restock: 35
  expiry_date: <%= 1.year.from_now.to_date %>
  warnings: >-
    Do not exceed the recommended dose. If symptoms persist for more than 3
    days, consult your doctor. Contains paracetamol - do not use with
    other paracetamol-containing products.

movicol:
  household: fixture_household
  name: >-
    Movicol Paediatric Plain oral powder 6.9g sachets (Norgine Pharmaceuticals Ltd) 30 sachet
    15 x 2 sachets
  friendly_name: Movicol Paediatric Plain
  location: home
  category: Osmotic Laxative
  dose_amount: 1
  dose_unit: sachet
  current_supply: 30
  supply_at_last_restock: 30
  expiry_date: <%= 1.year.from_now.to_date %>

vitamin_d:
  household: fixture_household
  name: Vitamin D
  location: home
  category: Vitamin
  description: >-
    Vitamin D helps regulate the amount of calcium and phosphate in the body.
    These nutrients are needed to keep bones, teeth and muscles healthy.
  dose_amount: 1000
  dose_unit: IU
  current_supply: 40
  supply_at_last_restock: 40
  expiry_date: <%= 1.year.from_now.to_date %>
  warnings: >-
    Do not exceed recommended dosage. Consult your doctor before taking
    supplements.

vitamin_c:
  household: fixture_household
  name: Vitamin C
  location: home
  category: Vitamin
  description: >-
    Vitamin C is an essential nutrient that supports immune function and acts
    as an antioxidant.
  dose_amount: 500
  dose_unit: mg
  current_supply: 60
  supply_at_last_restock: 60
  expiry_date: <%= 1.year.from_now.to_date %>
  warnings: >-
    Do not exceed recommended dosage. May cause stomach upset if taken on an
    empty stomach.

gabapentin:
  household: fixture_household
  name: Gabapentin
  location: home
  category: Anticonvulsant
  dose_amount: 300
  dose_unit: mg
  current_supply: 90
  supply_at_last_restock: 90
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Gabapentin is used to treat nerve pain and certain types of seizures. It works
    by affecting chemicals and nerves in the body that are involved in the cause of
    seizures and some types of pain.
  warnings: >-
    May cause dizziness and drowsiness. Do not drive or operate machinery until you
    know how this medication affects you. Do not stop taking suddenly without
    consulting your doctor.

metformin:
  household: fixture_household
  name: Metformin
  location: home
  category: Antidiabetic
  dose_amount: 500
  dose_unit: mg
  current_supply: 60
  supply_at_last_restock: 60
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Metformin is used to treat type 2 diabetes. It helps control blood sugar levels
    and is often prescribed alongside diet and exercise changes.
  warnings: >-
    Take with or after food to reduce stomach side effects. Do not take if you have
    kidney problems. Contact your doctor immediately if you experience unusual muscle
    pain, difficulty breathing, or stomach pain.

mebeverine:
  household: fixture_household
  name: Mebeverine
  location: home
  category: Gastrointestinal
  dose_amount: 135
  dose_unit: mg
  current_supply: 60
  supply_at_last_restock: 60
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Mebeverine is used to treat symptoms of irritable bowel syndrome (IBS), including
    stomach cramps, pain, and spasms. It works by relaxing the muscles in the wall
    of the gut.
  warnings: >-
    Take 20 minutes before meals. Do not exceed the recommended dose. If symptoms
    worsen or do not improve, consult your doctor.

sitagliptin:
  household: fixture_household
  name: Sitagliptin
  location: home
  category: Antidiabetic
  dose_amount: 100
  dose_unit: mg
  current_supply: 30
  supply_at_last_restock: 30
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Sitagliptin is used to treat type 2 diabetes. It works by increasing levels of
    natural substances that lower blood sugar when it is high, especially after meals.
  warnings: >-
    Tell your doctor if you experience severe joint pain or signs of kidney problems.
    Do not use to treat type 1 diabetes or diabetic ketoacidosis.

simvastatin:
  household: fixture_household
  name: Simvastatin
  location: home
  category: Cholesterol
  dose_amount: 40
  dose_unit: mg
  current_supply: 30
  supply_at_last_restock: 30
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Simvastatin is used to lower cholesterol and triglycerides in the blood. It
    helps reduce the risk of heart disease and cardiovascular events.
  warnings: >-
    Take at night for best effect. Tell your doctor immediately if you experience
    unexplained muscle pain, tenderness or weakness. Avoid grapefruit juice.

dapagliflozin:
  household: fixture_household
  name: Dapagliflozin
  location: home
  category: Antidiabetic
  dose_amount: 10
  dose_unit: mg
  current_supply: 30
  supply_at_last_restock: 30
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Dapagliflozin is used to treat type 2 diabetes. It works by helping the kidneys
    remove glucose from the body through urine, lowering blood sugar levels.
  warnings: >-
    May increase risk of urinary tract infections and genital infections. Stay well
    hydrated. Stop taking and seek medical help if you experience signs of diabetic
    ketoacidosis.

omeprazole:
  household: fixture_household
  name: Omeprazole
  location: home
  category: Gastrointestinal
  dose_amount: 20
  dose_unit: mg
  current_supply: 30
  supply_at_last_restock: 30
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Omeprazole is a proton pump inhibitor (PPI) used to reduce the amount of acid
    produced in the stomach. It is used to treat acid reflux, heartburn, and stomach
    ulcers.
  warnings: >-
    Long-term use may affect magnesium levels and increase risk of bone fractures.
    Tell your doctor if you have liver problems. May mask symptoms of stomach cancer.

duloxetine:
  household: fixture_household
  name: Duloxetine
  location: home
  category: Antidepressant
  dose_amount: 30
  dose_unit: mg
  current_supply: 120
  supply_at_last_restock: 120
  expiry_date: <%= 1.year.from_now.to_date %>
  description: >-
    Duloxetine is used to treat fibromyalgia, depression, anxiety, and nerve pain.
    It works by increasing the activity of serotonin and norepinephrine in the
    nervous system.
  warnings: >-
    Do not stop taking suddenly without consulting your doctor as this may cause
    withdrawal symptoms. May increase thoughts of suicide in young adults during
    early treatment. Avoid alcohol.
