---
# Database configuration for MedTracker
# All environments use DATABASE_URL environment variable
<% primary_database_role = ENV["DATABASE_ROLE"].to_s.strip %>

development:
  primary:
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] %>
    seeds: false
<% if primary_database_role != "" %>
    variables:
      role: <%= primary_database_role %>
<% end %>
  queue:
    adapter: postgresql
    url: <%= ENV['SOLID_QUEUE_DATABASE_URL'] %>
    migrations_paths: db/queue_migrate

test:
  adapter: postgresql
  url: <%= ENV['DATABASE_URL'] %>
  seeds: false
  prepared_statements: false
<% if primary_database_role != "" %>
  variables:
    role: <%= primary_database_role %>
<% end %>

production:
  primary:
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] %>
<% if primary_database_role != "" %>
    variables:
      role: <%= primary_database_role %>
<% end %>
  cache:
    adapter: postgresql
    url: <%= ENV['SOLID_CACHE_DATABASE_URL'] %>
    migrations_paths: db/cache_migrate
  queue:
    adapter: postgresql
    url: <%= ENV['SOLID_QUEUE_DATABASE_URL'] %>
    migrations_paths: db/queue_migrate
  cable:
    adapter: postgresql
    url: <%= ENV['SOLID_CABLE_DATABASE_URL'] %>
    migrations_paths: db/cable_migrate
