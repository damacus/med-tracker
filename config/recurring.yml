production:
  schedule_daily_reminders:
    class: ScheduleDailyRemindersJob
    schedule: every day at midnight
    queue: default
  refresh_medication_review_evidence:
    class: MedicationReviewEvidenceRefreshJob
    schedule: every Sunday at 3am
    queue: default
  expire_household_exports:
    class: ExpireHouseholdExportsJob
    schedule: every hour
    queue: default

