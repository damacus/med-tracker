---
# Development Environment Tasks
# All tasks operate on the 'dev' profile (compose.yaml)
# Usage: task dev:<command>
version: "3"

tasks:
  build:
    desc: Build development Docker images
    summary: |
      Build Docker images for development environment.
      Use NO_CACHE=true to force a fresh build.
      Usage: task dev:build
      Usage: task dev:build NO_CACHE=true
    cmds:
      - task: :internal:build
        vars:
          ENVIRONMENT: dev
          NO_CACHE: '{{ .NO_CACHE | default "" }}'

  up:
    desc: Start development server
    summary: |
      Start the development server with all services running in detached mode.
      Database data persists between restarts.

      File changes are automatically synced via bind mount (.:/app).
      Code changes in app/, config/, lib/ are immediately reflected.
      For Gemfile changes, rebuild with: task dev:build && task dev:up

      Usage: task dev:up
    cmds:
      - task: :internal:up
        vars: { ENVIRONMENT: dev }

  seed:
    desc: Seed development database with fixtures
    summary: |
      Seed the development database with fixtures from db/seeds.rb.
      Safe to run multiple times (idempotent if seeds are written correctly).
      Usage: task dev:seed
    cmds:
      - task: :internal:seed
        vars: { ENVIRONMENT: dev }

  stop:
    desc: Stop development server
    summary: |
      Stop the development server and remove containers.
      Database volumes are preserved.
      Usage: task dev:stop
    cmds:
      - task: :internal:stop
        vars: { ENVIRONMENT: dev, MAIL_SERVICE: mail-dev }

  ps:
    desc: List current status of Docker Compose Stack
    summary: |
      List current status of Docker Compose Stack
      Usage: task dev:ps
    cmds:
      - task: :internal:ps
        vars: { ENVIRONMENT: dev }

  db-migrate:
    desc: Run Rails migrations
    summary: |
      Run Rails migrations on the development database
      Usage: task dev:db-migrate
    cmds:
      - task: :internal:db-migrate
        vars: { ENVIRONMENT: dev }

  assets-rebuild:
    desc: Rebuild compiled assets inside the development container
    summary: |
      Rebuild compiled Rails assets inside the development web container.
      Useful when importmap or Propshaft asset resolution gets out of sync.
      Usage: task dev:assets-rebuild
    cmds:
      - task: :internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: "find public/assets -mindepth 1 -maxdepth 1 -exec rm -rf {} +"
      - task: :internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: "rails assets:precompile"

  rebuild:
    desc: Rebuild development server (drops database)
    summary: |
      Rebuild the development environment from scratch.
      WARNING: This drops the database and all data!
      Use when database migrations have changed or you need a fresh start.
      Usage: task dev:rebuild
    # prompt: This removes all data and rebuilds the development environment. Are you sure?
    cmds:
      - task: :internal:stop
        vars:
          { ENVIRONMENT: dev, REMOVE_VOLUMES: "true", MAIL_SERVICE: mail-dev }
      - task: :internal:build
        vars: { ENVIRONMENT: dev }
      - task: :internal:up
        vars: { ENVIRONMENT: dev }
      - task: :internal:seed
        vars: { ENVIRONMENT: dev }
      - task: :internal:open-ui
        vars: { ENVIRONMENT: dev }

  logs:
    desc: View development server logs
    summary: |
      View and follow development server logs in real-time.
      Press Ctrl+C to stop following.
      Usage: task dev:logs
    cmds:
      - task: :internal:logs
        vars: { ENVIRONMENT: dev }

  seed-medicines:
    desc: Seed medicines from db/seeds/medicines.yml
    summary: |
      Seed the development database with medicines from db/seeds/medicines.yml.
      Idempotent — safe to run multiple times.
      Usage: task dev:seed-medicines
    cmds:
      - task: :internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'rails runner ''load Rails.root.join("db/seeds/seed_medicines.rb")'''

  seed-users:
    desc: Seed initial users via invitations from db/seeds/users.yml
    summary: |
      Send invitation emails to users listed in db/seeds/users.yml.
      Idempotent — skips emails that already have an account or pending invitation.
      Emails are delivered to letter_opener / mailcatcher in development.
      Usage: task dev:seed-users
    cmds:
      - task: :internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'rails runner ''load Rails.root.join("db/seeds/seed_users.rb")'''

  import-dmd-barcodes:
    desc: Import NHS dm+d GTIN barcode mappings from CSV
    summary: |
      Import barcode-to-dm+d mappings into the development database.
      Usage: task dev:import-dmd-barcodes FILE=/absolute/path/to/barcodes.csv
    requires:
      vars: [FILE]
    cmds:
      - task: :internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: 'rails runner db/seeds/import_nhs_dmd_barcodes.rb "{{ .FILE }}"'

  extract-dmd-release:
    desc: Extract NHS dm+d release ZIP into the local release directory
    summary: |
      Unzip an NHS dm+d release archive into storage/nhs_dmd/releases/current
      so it can be imported with task dev:import-dmd-release.
      Existing files in the destination are removed first.
      Usage: task dev:extract-dmd-release
      Usage: task dev:extract-dmd-release ZIP_FILE=/absolute/path/to/release.zip
      Usage: task dev:extract-dmd-release ZIP_FILE=nhsbsa_dmd_4.1.0_20260413000001.zip
    vars:
      ZIP_FILE: '{{ .ZIP_FILE | default "nhsbsa_dmd_4.1.0_20260413000001.zip" }}'
      DEST_DIR: storage/nhs_dmd/releases/current
    cmds:
      - test -f "{{ .ZIP_FILE }}"
      - mkdir -p "{{ .DEST_DIR }}"
      - find "{{ .DEST_DIR }}" -mindepth 1 -delete
      - unzip -o "{{ .ZIP_FILE }}" -d "{{ .DEST_DIR }}"

  import-dmd-release:
    desc: Import NHS dm+d release XML (AMPP names + GTIN barcodes)
    summary: |
      Parse the dm+d release XML files and import AMPP product names
      with their GTIN barcodes into the development database.
      Automatically extracts the GTIN zip if only the zip is present.
      RELEASE_DIR is a host path; it is bind-mounted into the container.
      Usage: task dev:import-dmd-release RELEASE_DIR=storage/nhs_dmd/releases/current
    requires:
      vars: [RELEASE_DIR]
    vars:
      COMPOSE_PROJECT:
        sh: basename $PWD
      ABS_RELEASE_DIR:
        sh: 'cd "{{ .RELEASE_DIR }}" && pwd'
      CONTAINER_MOUNT: /tmp/dmd-release
    cmds:
      - >-
        docker compose -p {{ .COMPOSE_PROJECT }} --profile dev run --rm
        -v "{{ .ABS_RELEASE_DIR }}:{{ .CONTAINER_MOUNT }}:ro"
        web-dev rails runner db/seeds/import_nhs_dmd_release.rb "{{ .CONTAINER_MOUNT }}"

  port:
    desc: Print the host port of the running development server
    summary: |
      Print the host port that the development web container is listening on.
      Useful for constructing URLs or scripting against the dev server.
      Usage: task dev:port
    cmds:
      - task: :internal:port
        vars: { ENVIRONMENT: dev }

  open-ui:
    desc: Open development server UI
    summary: |
      Open the development server UI in your default browser.
      Usage: task dev:open-ui
    cmds:
      - task: :internal:open-ui
        vars: { ENVIRONMENT: dev }

  runner:
    desc: Run Ruby code in the dev container via rails runner
    summary: |
      Run arbitrary Ruby/Rails code inside the dev container without touching Docker directly.
      Usage: task dev:runner CODE="puts Account.count"
      Usage: task dev:runner CODE="Account.all.each{|a| puts a.email}"
    requires:
      vars: [CODE]
    cmds:
      - task: :internal:run
        vars:
          ENVIRONMENT: dev
          COMMAND: "rails runner '{{ .CODE }}'"

  accounts:
    desc: List seeded dev accounts (email addresses)
    summary: |
      Print all account email addresses in the development database.
      Useful for finding login credentials when taking screenshots or debugging.
      Usage: task dev:accounts
    cmds:
      - task: runner
        vars:
          CODE: "Account.all.each{|a| puts a.email}"
