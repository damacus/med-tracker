---
version: "3"

tasks:
  run:
    desc: Run Lighthouse audit on dashboard (requires dev server running)
    summary: |
      Run Lighthouse mobile audit on the dashboard page
      Requires: task dev:up to be running
      Output: lighthouse-report.json and lighthouse-report.html
      Usage: task lighthouse:run
      Usage: task lighthouse:run URL=http://localhost:3000/medicines
    vars:
      DEV_PORT:
        sh: task dev:port
      URL: '{{ .URL | default (printf "http://localhost:%s/dashboard" .DEV_PORT) }}'
    cmds:
      - |
        echo "Running Lighthouse audit on {{ .URL }}..."
        npx --yes lighthouse@13 {{ .URL }} \
          --output=json,html \
          --output-path=./lighthouse-report \
          --chrome-flags="--headless --no-sandbox" \
          --form-factor=mobile \
          --screenEmulation.mobile=true \
          --screenEmulation.width=375 \
          --screenEmulation.height=812 \
          --only-categories=accessibility,best-practices,performance
      - task: summary

  summary:
    desc: Display Lighthouse score summary
    summary: |
      Parse and display Lighthouse scores from the latest report
      Usage: task lighthouse:summary
    cmds:
      - |
        REPORT_FILE=""
        HTML_FILE=""
        if [ -f lighthouse-report.report.json ]; then
          REPORT_FILE="lighthouse-report.report.json"
          HTML_FILE="lighthouse-report.report.html"
        elif [ -f lighthouse-report.json ]; then
          REPORT_FILE="lighthouse-report.json"
          HTML_FILE="lighthouse-report.html"
        fi

        if [ -n "$REPORT_FILE" ]; then
          echo ""
          echo "═══════════════════════════════════════════"
          echo "         LIGHTHOUSE MOBILE SCORES          "
          echo "═══════════════════════════════════════════"
          node -e "
            const r = require('./$REPORT_FILE');
            console.log('Performance:     ' + Math.floor(r.categories.performance.score * 100) + '%');
            console.log('Accessibility:   ' + Math.floor(r.categories.accessibility.score * 100) + '%');
            console.log('Best Practices:  ' + Math.floor(r.categories['best-practices'].score * 100) + '%');
          "
          echo "═══════════════════════════════════════════"
          echo ""
          echo "Full report: $HTML_FILE"
        else
          echo "No Lighthouse JSON report found. Run 'task lighthouse:run' first."
          exit 1
        fi

  ci:
    desc: Run Lighthouse audit for CI (fails if scores below threshold)
    summary: |
      Run Lighthouse audit and fail if scores are below thresholds
      Performance 60% catches major mobile regressions with headroom for CI variance.
      Accessibility and Best Practices 90% keep high-confidence regressions blocking.
      Usage: task lighthouse:ci
      Usage: task lighthouse:ci URL=http://localhost:3000/login
      Usage: task lighthouse:ci EXTRA_HEADERS='{"Cookie":"session=value"}'
    vars:
      URL: '{{ .URL | default "http://localhost:3000/login" }}'
      PERF_THRESHOLD: '{{ .PERF_THRESHOLD | default "60" }}'
      A11Y_THRESHOLD: '{{ .A11Y_THRESHOLD | default "90" }}'
      BP_THRESHOLD: '{{ .BP_THRESHOLD | default "90" }}'
      REPORT_PATH: '{{ .REPORT_PATH | default "./lighthouse-report" }}'
      LIGHTHOUSE_RUNS: '{{ .LIGHTHOUSE_RUNS | default "3" }}'
      EXTRA_HEADERS: '{{ .EXTRA_HEADERS | default "" }}'
    cmds:
      - |
        set -euo pipefail
        for run in $(seq 1 {{ .LIGHTHOUSE_RUNS }}); do
          REPORT_PATH="{{ .REPORT_PATH }}-${run}"
          echo "Running Lighthouse CI audit ${run}/{{ .LIGHTHOUSE_RUNS }} on {{ .URL }}..."
          npx --yes lighthouse@13 {{ .URL }} \
            --output=json,html \
            --output-path="$REPORT_PATH" \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --form-factor=mobile \
            --screenEmulation.mobile=true \
            --screenEmulation.width=375 \
            --screenEmulation.height=812 \
            {{ if .EXTRA_HEADERS }}--extra-headers='{{ .EXTRA_HEADERS }}' {{ end }}--only-categories=accessibility,best-practices,performance
        done
      - |
        node bin/lighthouse_score_gate.js \
          --report-path "{{ .REPORT_PATH }}" \
          --runs "{{ .LIGHTHOUSE_RUNS }}" \
          --perf-threshold "{{ .PERF_THRESHOLD }}" \
          --a11y-threshold "{{ .A11Y_THRESHOLD }}" \
          --bp-threshold "{{ .BP_THRESHOLD }}"

  failed-audits:
    desc: List failed Lighthouse audits
    summary: |
      Show details of failed audits from the latest report
      Usage: task lighthouse:failed-audits
    cmds:
      - |
        REPORT_FILE=""
        if [ -f lighthouse-report.report.json ]; then
          REPORT_FILE="lighthouse-report.report.json"
        elif [ -f lighthouse-report.json ]; then
          REPORT_FILE="lighthouse-report.json"
        fi

        if [ -n "$REPORT_FILE" ]; then
          echo "Failed audits:"
          node -e "const r=require('./$REPORT_FILE');Object.entries(r.audits).filter(([k,v])=>v.score!=null&&v.score<1).forEach(([k,v])=>console.log('  ['+Math.floor(v.score*100)+'%] '+v.title))"
        else
          echo "No Lighthouse JSON report found. Run 'task lighthouse:run' first."
          exit 1
        fi
